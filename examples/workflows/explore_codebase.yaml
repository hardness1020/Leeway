name: explore_codebase
description: "Explore a codebase: scan structure, find key files, summarize architecture"
start_node: scan
global_tools:
  - read_file
  - grep

nodes:
  # ── Linear: always transitions to the next node ──
  scan:
    prompt: >
      Scan the project structure. Use glob to find source files,
      config files (package.json, pyproject.toml, Makefile, etc.),
      and README. Get an overview of what this project is.
    tools:
      - glob
      - bash
    max_turns: 8
    edges:
      - target: assess
        when: { always: true }

  # ── Branch: signal decides the path ──
  assess:
    prompt: >
      Based on what you found, assess the project:
      - "well_documented" if there is a clear README and docs
      - "needs_investigation" if the structure is unclear or undocumented
      - "trivial" if it's a very small or single-file project
    max_turns: 3
    edges:
      - target: deep_dive
        when: { signal: needs_investigation }
      - target: summarize
        when: { signal: well_documented }
      - target: summarize
        when: { signal: trivial }

  # ── Loop: keep investigating until satisfied ──
  deep_dive:
    prompt: >
      Read the most important source files to understand the architecture.
      Look at entry points, main modules, and how components connect.
      Signal "enough" when you have a good understanding,
      or "dig_deeper" if you need to read more files.
    tools:
      - glob
      - bash
    max_turns: 15
    edges:
      - target: deep_dive
        when: { signal: dig_deeper }
      - target: summarize
        when: { signal: enough }

  # ── Merge: all paths lead here. Terminal node ──
  summarize:
    prompt: >
      Write a clear summary of the codebase with sections:
      ## Overview, ## Key Files, ## Architecture, ## Tech Stack.
      Keep it concise but informative.
    max_turns: 5
