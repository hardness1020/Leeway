# ──────────────────────────────────────────────────────────────────────────────
# Leeway Example: code-health
#
# Quick health check on any codebase. No user input needed — just run it.
#
# Demonstrates ALL workflow features:
#   - Linear transition (scan → triage)
#   - Signal-based branching (triage → review or scan again)
#   - Self-loop (triage → triage via "dig_deeper")
#   - Parallel branches with conditions and per-branch scoping
#   - Human-in-the-loop approval gate (security branch)
#   - Global tools/skills/hooks
#   - Terminal node (report)
#
# Run with:
#   /code-health
# ──────────────────────────────────────────────────────────────────────────────

name: code-health
description: >
  Run a quick health check on the current codebase: scan structure,
  triage issues, review in parallel, then report findings.

start_node: scan

# ── Globals ──────────────────────────────────────────────────────────────────

global_tools:
  - read_file
  - grep

global_skills:
  - coding-standards

global_hooks:
  - type: command
    match: { event: workflow_start }
    command: "echo \"[$(date -Iseconds)] code-health started\" >> /tmp/leeway_hooks.log"
    timeout: 5
  - type: command
    match: { event: workflow_end }
    command: "echo \"[$(date -Iseconds)] code-health ended\" >> /tmp/leeway_hooks.log"
    timeout: 5

# ── Nodes ────────────────────────────────────────────────────────────────────

nodes:

  # ── LINEAR: ask scope then scan ──
  scan:
    prompt: >
      Ask the user ONE question about what they want checked (e.g. a
      specific directory, a file pattern, or "everything"). Then run
      ONE glob and ONE bash command to get a structural overview.
      Output: language, framework, approximate file count, test presence.
      Do not make more than 3 tool calls total.
    tools:
      - ask_user_question
      - glob
      - bash
    interactive: true
    max_turns: 8
    edges:
      - target: triage
        when: { always: true }

  # ── BRANCH + LOOP: decide what needs attention ──
  triage:
    prompt: >
      Assess codebase health using a single bash command that checks
      all of: README existence, test file count, TODO/FIXME count,
      and largest files (e.g. combine with && or ;).
      Do not use more than 2 tool calls before signalling.

      Signal "dig_deeper" if critical info is missing.
      Signal "ready" when you have enough to review.

      In your signal summary, include these markers if applicable:
      - "has_security_risk" if you see credentials, secrets, or unsafe patterns
      - "missing_docs" if README is absent or key modules lack docstrings
    tools:
      - glob
      - bash
    interactive: false
    max_turns: 8
    edges:
      - target: triage
        when: { signal: dig_deeper }
      - target: review
        when: { signal: ready }

  # ── PARALLEL: concurrent review branches with per-branch scoping ──
  review:
    parallel:
      branches:

        # Always runs — code quality check
        quality:
          when: { always: true }
          prompt: >
            Based on the context from prior steps, list top 3 code quality
            findings (naming, file organization, anti-patterns).
            Only use a tool if the prior context is insufficient.
            Prefer writing your analysis directly without tool calls.
          tools:
            - glob
          skills:
            - code-review
          max_turns: 3

        # Conditional — only if security risk detected
        security:
          when: { output_matches: "has_security_risk" }
          prompt: >
            Based on context from prior steps, list security findings
            (hardcoded secrets, injection risks, missing validation)
            with severity. Only use a tool if prior context is insufficient.
            Prefer writing your analysis directly without tool calls.
          tools:
            - glob
          skills:
            - security-audit
          requires_approval: true
          max_turns: 3

        # Conditional — only if docs are missing
        docs:
          when: { output_matches: "missing_docs" }
          prompt: >
            Based on context from prior steps, list top 3 documentation
            gaps (missing README sections, undocumented APIs, missing
            type hints). Only use a tool if prior context is insufficient.
            Prefer writing your analysis directly without tool calls.
          tools:
            - glob
          hooks:
            - type: command
              match: { event: after_tool_use, tool_name: grep }
              command: "echo '[hook] grep used in docs branch' >> /tmp/leeway_hooks.log"
              timeout: 5
          max_turns: 3

      timeout: 120

    edges:
      - target: report
        when: { always: true }

  # ── TERMINAL: compile findings ──
  report:
    prompt: >
      Write a short health report with these sections:
      ## Summary (1-2 sentences)
      ## Findings (bullet list, max 5 items)
      ## Recommended Actions (bullet list, max 3 items)

      Be concise. Do not create any files. Do not call any tools —
      just write the report from the context you already have.
    carry_context: true
    max_turns: 2
